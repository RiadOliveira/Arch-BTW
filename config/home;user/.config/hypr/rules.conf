windowrule = suppress_event maximize, match:class .*
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false

windowrule = float on, match:class ^(anki|btop|launcher|localsend|qalc|swayimg|thunar|xdg-desktop-portal-gtk)$
windowrule = center on, match:class ^(anki|launcher|localsend|qalc|swayimg|thunar|xdg-desktop-portal-gtk)$

windowrule = size 700 600, match:class ^(anki|launcher|localsend|qalc|swayimg|thunar|xdg-desktop-portal-gtk)$

windowrule = move 10 62, match:class ^btop$
windowrule = size 1900 1008, match:class ^btop$

layerrule = blur on, match:namespace waybar
